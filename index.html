<!DOCTYPE html>
<html>
<head>
    <title>Food Quality Detection</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background: url("/static/food_bg.png") no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            top: 0;
            left: 0;
            z-index: -1;
        }

        .header {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 24px;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 40%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        #preview {
            margin-top: 10px;
            max-width: 100%;
            height: 180px;
            border-radius: 10px;
            display: none;
        }

        .file-info {
            margin-top: 10px;
        }

        .remove-btn {
            background: red;
            padding: 5px 10px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        .loading {
            display: none;
            margin-top: 10px;
            font-weight: bold;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
        }

        .fresh { color: #00ff9c; }
        .burnt { color: #ff4c4c; }
        .medium { color: #ffd700; }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
    🍔 AI Food Quality Detection Dashboard
</div>

<div class="main">
<div class="container">

    <h2>Upload Food Image</h2>

    <form id="form" action="/" method="post" enctype="multipart/form-data">
        <input type="file" id="fileInput" name="file" accept="image/*" onchange="previewImage(event)" required>

        <div id="fileInfo" class="file-info"></div>

        <img id="preview">

        <br><br>
        <button id="submitBtn" type="submit">Analyze</button>

        <p id="loading" class="loading">⏳ Analyzing Image...</p>
    </form>

    {% if result %}
    <div class="result">
        <h3>Result</h3>

        <p class="{% if result=='Fresh' %}fresh{% elif result=='Burnt' %}burnt{% else %}medium{% endif %}">
            <strong>Prediction:</strong> {{ result }}
        </p>

        <p><strong>Risk Level:</strong> {{ risk }}</p>
    </div>
    {% endif %}

</div>
</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('preview');
    const fileInfo = document.getElementById('fileInfo');

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    fileInfo.innerHTML = file.name + 
        ' <span class="remove-btn" onclick="removeFile()">X</span>';
}

function removeFile() {
    document.getElementById('fileInput').value = "";
    document.getElementById('preview').style.display = "none";
    document.getElementById('fileInfo').innerHTML = "";
}

document.getElementById('form').addEventListener('submit', function() {
    document.getElementById('loading').style.display = "block";
    document.getElementById('submitBtn').disabled = true;
});
</script>

</body>
</html>
