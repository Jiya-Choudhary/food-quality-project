<!DOCTYPE html>
<html>
<head>
    <title>Food Quality Detection</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;

            background: url("/static/food_bg.png") no-repeat center center/cover;
            height: 100vh;

            /* 🔥 Flexbox layout */
            display: flex;
            flex-direction: column;
        }

        /* 🔥 Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            top: 0;
            left: 0;
            z-index: -1;
        }

        .header {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* 🔥 Center container */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 40%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;

            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
        }

        input[type="file"] {
            margin: 20px 0;
            color: white;
        }

        /* 🔥 Button animation */
        button {
            background: #27ae60;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #219150;
            transform: scale(1.05);
        }

        /* 🔥 Image preview */
        #preview {
            margin-top: 15px;
            max-width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            display: none;
        }

        /* 🔥 Result box */
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;

            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            color: white;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="header">
    🍔 AI Food Quality Detection Dashboard
</div>

<div class="main">
    <div class="container">
        <h2>Upload Food Image</h2>

        <form action="/" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="image/*" onchange="previewImage(event)" required><br>

            <img id="preview">

            <br>
            <button type="submit">Analyze</button>
        </form>

        {% if result %}
        <div class="result">
            <h3>Result</h3>
            <p><strong>Prediction:</strong> {{ result }}</p>
            <p><strong>Risk Level:</strong> {{ risk }}</p>
        </div>
        {% endif %}
    </div>
</div>

<script>
    function previewImage(event) {
        const image = document.getElementById('preview');
        image.src = URL.createObjectURL(event.target.files[0]);
        image.style.display = "block";
    }
</script>

</body>
</html>
